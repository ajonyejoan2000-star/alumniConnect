<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Alumni Directory — AlumniConnect</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="css/style.css"/>
  <style>
    .page-wrap { max-width: 1060px; margin: 0 auto; padding: 40px 24px; }
    .page-header { margin-bottom: 28px; }
    .page-header h1 { font-size: 28px; font-weight: 800; letter-spacing: -0.8px; }
    .page-header p  { font-size: 14px; color: var(--text-light); margin-top: 4px; }

    /* Filter bar */
    .filter-bar {
      background: #fff;
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      margin-bottom: 28px;
      display: flex; flex-wrap: wrap; gap: 12px; align-items: flex-end;
    }
    .filter-bar input,
    .filter-bar select {
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 10px 14px;
      font-size: 14px;
      font-family: inherit;
      color: var(--text-dark);
      outline: none;
      flex: 1; min-width: 140px;
      transition: border-color var(--transition);
    }
    .filter-bar input:focus,
    .filter-bar select:focus { border-color: var(--purple); }

    /* Alumni grid */
    .alumni-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
    }
    .alumni-card {
      background: #fff;
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 22px;
      transition: box-shadow var(--transition);
    }
    .alumni-card:hover { box-shadow: var(--shadow); }
    .alumni-card-top { display: flex; align-items: center; gap: 14px; margin-bottom: 14px; }
    .alumni-av {
      width: 56px; height: 56px;
      border-radius: 50%;
      background: var(--purple);
      color: #fff;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px; font-weight: 700;
      flex-shrink: 0;
    }
    .alumni-name { font-size: 15px; font-weight: 700; margin-bottom: 2px; }
    .alumni-role { font-size: 13px; color: var(--text-light); }
    .cohort-badge {
      display: inline-block;
      background: var(--purple-pale);
      color: var(--purple);
      border-radius: 100px;
      padding: 3px 10px;
      font-size: 11px; font-weight: 700;
      margin-top: 4px;
    }
    .alumni-bio { font-size: 13px; color: var(--text-mid); line-height: 1.6; margin-bottom: 10px; }
    .alumni-location { font-size: 13px; color: var(--text-light); margin-bottom: 16px; }
    .alumni-location i { margin-right: 4px; }
    .alumni-actions { display: flex; gap: 10px; }
    .alumni-actions button { flex: 1; padding: 9px 12px; justify-content: center; font-size: 13px; }

    .empty-state {
      text-align: center; padding: 60px 24px; color: var(--text-light);
      grid-column: 1/-1;
    }
    .empty-state i { font-size: 48px; display: block; margin-bottom: 12px; color: var(--purple-mid); }
  </style>
</head>
<body>

<div class="page-wrap">
  <div class="page-header">
    <h1>Alumni Directory</h1>
    <p>Connect with fellow alumni from your cohort and beyond</p>
  </div>

  <!-- Filters -->
  <div class="filter-bar">
    <input type="text" id="searchName" placeholder="Search by name…"/>
    <select id="filterCohort">
      <option value="">All Cohorts</option>
      <option value="Cohort 1">Cohort 1</option>
      <option value="Cohort 2">Cohort 2</option>
      <option value="Cohort 3">Cohort 3</option>
      <option value="Cohort 4">Cohort 4</option>
      <option value="Cohort 5">Cohort 5</option>
      <option value="Cohort 6">Cohort 6</option>
    </select>
    <select id="filterSkill">
      <option value="">All Skills</option>
      <option value="JavaScript">JavaScript</option>
      <option value="Python">Python</option>
      <option value="Product Management">Product Management</option>
      <option value="UI/UX Design">UI/UX Design</option>
      <option value="Data Analysis">Data Analysis</option>
    </select>
    <input type="text" id="filterLocation" placeholder="Location…"/>
    <button class="btn-purple" onclick="searchAlumni()" style="flex:none;">
      <i class="bi bi-search"></i> Search
    </button>
  </div>

  <!-- Grid -->
  <div class="alumni-grid" id="alumniList">
    <div class="empty-state"><i class="bi bi-hourglass-split"></i> Loading alumni…</div>
  </div>
</div>

<script src="js/main.js"></script>
<script>
  let token = localStorage.getItem('token');

  async function searchAlumni() {
    const name     = document.getElementById('searchName').value;
    const cohort   = document.getElementById('filterCohort').value;
    const skill    = document.getElementById('filterSkill').value;
    const location = document.getElementById('filterLocation').value;

    const grid = document.getElementById('alumniList');
    grid.innerHTML = '<div class="empty-state"><i class="bi bi-hourglass-split"></i> Searching…</div>';

    try {
      let url = `${API_BASE}/directory/search?`;
      if (name)     url += `name=${encodeURIComponent(name)}&`;
      if (cohort)   url += `cohort=${encodeURIComponent(cohort)}&`;
      if (skill)    url += `skill=${encodeURIComponent(skill)}&`;
      if (location) url += `location=${encodeURIComponent(location)}&`;

      const res  = await fetch(url, { headers: { 'Authorization': `Bearer ${token}` } });
      const data = await res.json();
      const alumni = data.alumni || data || [];
      grid.innerHTML = '';

      if (!alumni.length) {
        grid.innerHTML = '<div class="empty-state"><i class="bi bi-people"></i> No alumni found. Try different filters.</div>';
        return;
      }

      alumni.forEach(person => {
        const initial = (person.name || '?').charAt(0).toUpperCase();
        const card = document.createElement('div');
        card.className = 'alumni-card';
        card.innerHTML = `
          <div class="alumni-card-top">
            <div class="alumni-av">${initial}</div>
            <div>
              <div class="alumni-name">${person.name}</div>
              <div class="alumni-role">${person.role || 'Alumni'}</div>
              ${person.cohort ? `<span class="cohort-badge">${person.cohort}</span>` : ''}
            </div>
          </div>
          <div class="alumni-bio">${person.bio || 'No bio provided yet.'}</div>
          <div class="alumni-location">
            <i class="bi bi-geo-alt"></i>${person.location || 'Location not specified'}
          </div>
          <div class="alumni-actions">
            <button class="btn-purple" onclick="viewProfile('${person._id}')">
              <i class="bi bi-person"></i> Profile
            </button>
            <button class="btn-outline" onclick="connectUser('${person._id}', this)">
              <i class="bi bi-person-plus"></i> Connect
            </button>
          </div>
        `;
        grid.appendChild(card);
      });
    } catch (err) {
      console.error('searchAlumni error:', err);
      grid.innerHTML = '<div class="empty-state"><i class="bi bi-wifi-off"></i> Could not load alumni. Is the server running?</div>';
    }
  }

  function viewProfile(userId) {
    window.location.href = `/profile?id=${userId}`;
  }

  async function connectUser(userId, btn) {
    btn.disabled  = true;
    btn.innerHTML = '<i class="bi bi-hourglass-split"></i> Sending…';
    try {
      const res = await fetch(`${API_BASE}/directory/${userId}/connect`, {
        method: 'POST',
        headers: { 'Authorization': `Bearer ${token}` }
      });
      if (res.ok) {
        btn.innerHTML = '<i class="bi bi-check-circle"></i> Sent!';
        btn.style.borderColor = '#16a34a';
        btn.style.color = '#16a34a';
      } else {
        btn.disabled  = false;
        btn.innerHTML = '<i class="bi bi-person-plus"></i> Connect';
      }
    } catch (err) {
      console.error(err);
      btn.disabled  = false;
      btn.innerHTML = '<i class="bi bi-person-plus"></i> Connect';
    }
  }

  searchAlumni();
</script>
</body>
</html>
